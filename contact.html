    <main>
        <h1 class="page-title" style="text-align: center;">Review Our Cuisine</h1>
    


        <div class="form-container">

    <h2 class="form-title">Leave a Review</h2>

    <form class="review-form">

        
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Ivan" required>

        
        <label for="dish">Dish Name</label>
        <input type="text" id="dish" name="dish" placeholder="e.g. Blini" required>

        
        <label for="rating">Rating</label>
        <select id="rating" name="rating" required>
            <option value="">Select rating</option>
            <option value="5">5 - Incredible</option>
            <option value="4">4 - Very Good</option>
            <option value="3">3 - Decent</option>
            <option value="2">2 - Not Great</option>
            <option value="1">1 - Never Again</option>
        </select>

        
        <label for="review">Your Review</label>
        <textarea id="review" name="review" rows="5" placeholder="Write your thoughts..." required></textarea>

       
        <label for="recipe">Share Your Recipe (optional)</label>
        <textarea id="recipe" name="recipe" rows="4" placeholder="Share a short version of the recipe (optional)"></textarea>

        
        <button type="submit">Submit Review</button>

    </form>

</div>
